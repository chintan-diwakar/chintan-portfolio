<style>
  :root {
    --bg:       #faf9f5;
    --surface:  #ffffff;
    --warm:     #f3f0e8;
    --ink:      #1a1614;
    --ink-2:    #6b6560;
    --ink-3:    #a09a92;
    --line:     rgba(20,15,10,0.08);
    --line-2:   rgba(20,15,10,0.14);
    --coral:    #c96442;
    --sans:     "Geist", ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    /* "serif" kept as the var name; the accent face is now Satoshi (used at 700). */
    --serif:    "Satoshi", ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-padding-top: 0; }
  html, body { background: var(--bg); color: var(--ink); }
  body {
    font-family: var(--sans);
    font-size: 16px; line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    cursor: none;
    overflow-x: hidden;
    /* Subtle paper grain */
    background-image:
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.08  0 0 0 0 0.07  0 0 0 0 0.05  0 0 0 0.045 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
    background-blend-mode: multiply;
  }
  a, button, input { cursor: none; font-family: inherit; color: inherit; text-decoration: none; }
  button { background: transparent; border: none; }
  ::selection { background: var(--coral); color: var(--bg); }
  img { max-width: 100%; display: block; }

  /* Scrollbar polish */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(20,15,10,0.16); border-radius: 5px; border: 2px solid var(--bg); }
  ::-webkit-scrollbar-thumb:hover { background: var(--coral); }

  /* Bird cursor */
  .bird-cursor {
    position: fixed; top: 0; left: 0;
    pointer-events: none; z-index: 9999;
    will-change: transform;
    mix-blend-mode: multiply;
  }
  .bird-cursor svg { display: block; overflow: visible; }
  .bird-wings {
    transform-origin: 18px 12px;
    animation: cdFlap 0.42s cubic-bezier(.6,.2,.4,.8) infinite;
  }
  @keyframes cdFlap {
    0%   { transform: scaleY(1)    translateY(0); }
    50%  { transform: scaleY(0.18) translateY(-1px); }
    100% { transform: scaleY(1)    translateY(0); }
  }
  .bird-cursor.over-link .bird-wings { animation-duration: 0.22s; }
  .bird-cursor .body-dot { opacity: 0; transition: opacity .15s; }
  .bird-cursor.over-link .body-dot { opacity: 1; }

  /* Marquee + bobbing arrow */
  @keyframes cdMarquee { from { transform: translateX(0); } to { transform: translateX(-33.333%); } }
  @keyframes cdBob { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(5px); } }
  @keyframes cdCaret { 50% { border-right-color: transparent; } }

  /* --- Ch.02 auto-scrolling card marquee --- */
  .cd-slider {
    overflow: hidden;
    -webkit-mask-image: linear-gradient(to right, transparent, #000 5%, #000 95%, transparent);
            mask-image: linear-gradient(to right, transparent, #000 5%, #000 95%, transparent);
  }
  .cd-cardtrack {
    display: flex;
    gap: 20px;
    width: max-content;
    animation: cdScrollX 52s linear infinite;
    will-change: transform;
  }
  .cd-slider:hover .cd-cardtrack { animation-play-state: paused; }
  .cd-slide { flex: 0 0 auto; width: clamp(258px, 23vw, 300px); height: 388px; }
  @keyframes cdScrollX {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }

  /* --- Card flip: class-driven so hover can hint the flip --- */
  .cd-flip {
    transition: transform 0.7s cubic-bezier(0.22, 1, 0.36, 1);
    transform: rotateY(0deg);
  }
  .cd-flip.is-flipped { transform: rotateY(180deg); }
  /* Hover hint = a transition-based 3D tilt (NOT a keyframe animation), so a
     click flows smoothly from the tilt straight into the full 180° flip with
     no snap. Only hints while the card hasn't been flipped yet. */
  .cd-flipwrap:hover .cd-flip:not(.is-flipped) {
    transform: rotateY(-18deg) translateZ(12px);
  }

  /* --- Reveal: keyframe + class-toggle. Plays once when .is-in is set. --- */
  .cd-reveal {
    opacity: 0;
    transform: translateY(var(--cd-reveal-y, 28px));
    will-change: opacity, transform;
  }
  .cd-reveal.is-in {
    animation: cdRevealIn 0.85s cubic-bezier(0.22, 1, 0.36, 1) var(--cd-reveal-delay, 0s) forwards;
  }
  @keyframes cdRevealIn {
    from { opacity: 0; transform: translateY(var(--cd-reveal-y, 28px)); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* --- Polaroid entrance: drops in with a wobble. --- */
  .cd-polaroid {
    opacity: 0;
  }
  .cd-polaroid.is-in {
    animation: cdPolaroidDrop 1.1s cubic-bezier(0.22, 1, 0.36, 1) var(--cd-pol-delay, 0s) forwards;
  }
  @keyframes cdPolaroidDrop {
    0%   { opacity: 0; transform: translateY(-40px) rotate(var(--cd-tilt-start, 0deg)) scale(0.96); }
    60%  { opacity: 1; transform: translateY(4px)   rotate(calc(var(--cd-tilt-rest, 0deg) - 1deg)) scale(1.005); }
    100% { opacity: 1; transform: translateY(0)     rotate(var(--cd-tilt-rest, 0deg))            scale(1); }
  }

  /* --- Per-letter heading reveal (for "About" etc) --- */
  .cd-letters { display: inline-block; }
  .cd-letters .ltr {
    display: inline-block;
    opacity: 0;
    transform: translateY(0.6em);
  }
  .cd-letters.is-in .ltr {
    animation: cdLtrIn 0.6s cubic-bezier(0.22, 1, 0.36, 1) calc(var(--ltr-delay, 0s) + var(--i, 0) * 0.05s) forwards;
  }
  @keyframes cdLtrIn {
    to { opacity: 1; transform: translateY(0); }
  }

  /* Begin button */
  .cd-begin {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 12px 22px 12px 26px;
    border-radius: 999px;
    background: var(--ink);
    color: var(--bg);
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.04em;
    border: 1px solid var(--ink);
    position: relative;
    overflow: hidden;
    transition: transform .25s cubic-bezier(.22,1,.36,1), background .25s, padding .25s;
  }
  .cd-begin:hover { transform: translateY(-2px); background: var(--coral); border-color: var(--coral); padding-right: 28px; }
  .cd-begin .arr { transition: transform .25s; }
  .cd-begin:hover .arr { transform: translateY(2px); }

  /* Bigger Begin CTA — chunky coral pill with a hard ink-offset shadow.
     Used as the bottom-center button on mobile (and anywhere we want
     the "popping off the page" 3D effect). */
  .cd-begin-lg {
    padding: 16px 38px;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    border-radius: 12px;
    gap: 12px;
    background: var(--coral);
    color: #ffffff;
    border: 2px solid var(--ink);
    box-shadow: 7px 7px 0 0 var(--ink);
    transition: transform .16s cubic-bezier(.22,1,.36,1), box-shadow .16s, background .2s, padding .2s;
  }
  /* Override the base .cd-begin:hover (padding-right grow + lift) for the chunky variant —
     it presses into its shadow instead. */
  .cd-begin-lg:hover {
    background: var(--coral);
    border-color: var(--ink);
    padding: 16px 38px;
    transform: translate(2px, 2px);
    box-shadow: 4px 4px 0 0 var(--ink);
  }
  .cd-begin-lg:active {
    transform: translate(7px, 7px);
    box-shadow: 0 0 0 0 var(--ink);
  }
  .cd-begin-lg .arr { width: 16px; height: 16px; color: #ffffff; }
  .cd-begin-lg:hover .arr { transform: none; }

  /* Periodic shake — most of the cycle is still; a brief shake near the end. */
  @keyframes cdShakeCycle {
    0%, 86%, 100% { transform: translate(0, 0) rotate(0); }
    87% { transform: translate(-4px, -1px) rotate(-1.5deg); }
    89% { transform: translate(4px,  1px) rotate(1.5deg); }
    91% { transform: translate(-3px, 0)   rotate(-1deg); }
    93% { transform: translate(3px,  0)   rotate(1deg); }
    95% { transform: translate(-2px, 0)   rotate(-0.5deg); }
    97% { transform: translate(2px,  0)   rotate(0.5deg); }
    99% { transform: translate(0, 0) rotate(0); }
  }
  .cd-shake { animation: cdShakeCycle 2.4s ease-in-out 1.6s infinite; }
  .cd-shake:hover { animation: none; }
  /* The shake briefly overrides hover's transform — restore the lift on hover. */
  .cd-begin.cd-shake:hover { transform: translateY(-2px); }
  /* Chunky variant has its own press-into-shadow hover; override the base. */
  .cd-begin-lg.cd-shake:hover { transform: translate(2px, 2px); }

  /* Bottom-center dock for the Cover's Begin CTA (used on mobile).
     Sits inside the cover section; the button overflows below 0 a touch
     so the hard-offset shadow visually "pops out" beyond the page edge. */
  .cd-begin-dock {
    position: absolute; left: 0; right: 0; bottom: 26px;
    display: flex; justify-content: center;
    z-index: 6;
    pointer-events: none;
  }
  .cd-begin-dock .cd-begin { pointer-events: auto; }

  /* ---------- Top navigation ---------- */
  .cd-topnav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 60;
    height: 58px; display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px;
    background: rgba(250,249,245,0.72);
    backdrop-filter: saturate(180%) blur(12px);
    -webkit-backdrop-filter: saturate(180%) blur(12px);
    border-bottom: 1px solid var(--line);
  }
  .cd-wordmark {
    font-family: var(--sans); font-weight: 700; font-size: 19px;
    letter-spacing: -0.02em; color: var(--ink);
  }
  .cd-nav-links { display: flex; align-items: center; gap: 26px; }
  .cd-nav-link {
    font-size: 14px; font-weight: 500; color: var(--ink-2);
    letter-spacing: 0.01em; transition: color .2s;
  }
  .cd-nav-link:hover { color: var(--coral); }
  .cd-nav-contact {
    font-size: 14px; font-weight: 600; color: #fff; background: var(--coral);
    padding: 8px 17px; border-radius: 999px;
    box-shadow: 0 8px 20px -8px rgba(201,100,66,0.5);
    transition: transform .2s, box-shadow .2s;
  }
  .cd-nav-contact:hover { transform: translateY(-2px); box-shadow: 0 12px 26px -8px rgba(201,100,66,0.55); }
  .cd-nav-right { display: flex; align-items: center; gap: 26px; }
  .cd-nav-burger {
    display: none; background: transparent; border: none; color: var(--ink);
    width: 40px; height: 40px; align-items: center; justify-content: center; padding: 0;
  }
  .cd-mobile-menu {
    position: absolute; top: 54px; left: 0; right: 0;
    background: rgba(250,249,245,0.97);
    backdrop-filter: saturate(180%) blur(12px); -webkit-backdrop-filter: saturate(180%) blur(12px);
    border-bottom: 1px solid var(--line);
    box-shadow: 0 18px 30px -20px rgba(31,27,22,0.4);
    flex-direction: column; padding: 8px 18px 18px; gap: 2px;
    animation: cd-menu-in .18s ease;
  }
  @keyframes cd-menu-in { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
  .cd-mobile-link {
    font-size: 16px; font-weight: 600; color: var(--ink);
    padding: 14px 4px; border-bottom: 1px solid var(--line);
  }
  .cd-mobile-link:active { color: var(--coral); }
  .cd-mobile-contact {
    margin-top: 12px; text-align: center; font-size: 15px; font-weight: 600;
    color: #fff; background: var(--coral); padding: 14px; border-radius: 12px;
    box-shadow: 0 10px 22px -10px rgba(201,100,66,0.5);
  }
  @media (max-width: 720px) {
    .cd-nav-desktop { display: none; }
    .cd-nav-burger { display: inline-flex; }
    .cd-mobile-menu { display: flex; }
    .cd-topnav { padding: 0 18px; height: 54px; }
    .cd-wordmark { font-size: 18px; }
  }
  @media (min-width: 721px) {
    .cd-mobile-menu { display: none !important; }
  }

  /* ---------- Global paper grain + vignette ---------- */
  .cd-grain {
    position: fixed; inset: 0; z-index: 100; pointer-events: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='g'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix type='saturate' values='0'/></filter><rect width='100%' height='100%' filter='url(%23g)'/></svg>");
    background-size: 200px 200px;
    opacity: 0.05;
    mix-blend-mode: multiply;
  }
  .cd-vignette {
    position: fixed; inset: 0; z-index: 99; pointer-events: none;
    background: radial-gradient(115% 115% at 50% 42%, transparent 60%, rgba(20,15,10,0.05) 100%);
  }

  /* ---------- Contact rows ---------- */
  .cd-contact {
    display: flex; align-items: center; gap: 16px;
    padding: 14px 18px; border-radius: 14px;
    background: var(--surface); border: 1px solid var(--line-2);
    transition: transform .2s, border-color .2s, box-shadow .2s, background .2s;
  }
  .cd-contact:hover {
    background: var(--c); border-color: var(--c);
    transform: translateY(-3px);
    box-shadow: 0 16px 32px -16px color-mix(in srgb, var(--c) 60%, transparent);
  }
  .cd-c-chip {
    width: 44px; height: 44px; border-radius: 11px; flex: 0 0 auto;
    display: inline-flex; align-items: center; justify-content: center;
    background: var(--c); color: #fff; transition: background .2s;
  }
  .cd-contact:hover .cd-c-chip { background: rgba(255,255,255,0.22); }
  .cd-c-label { font-size: 15px; font-weight: 700; color: var(--ink); transition: color .2s; }
  .cd-c-value {
    font-size: 13px; color: var(--ink-2); transition: color .2s, opacity .2s;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .cd-contact:hover .cd-c-label { color: #fff; }
  .cd-contact:hover .cd-c-value { color: #fff; opacity: 0.85; }
  .cd-c-arr {
    margin-left: auto; flex: 0 0 auto; color: var(--ink-3);
    transition: transform .2s, color .2s;
  }
  .cd-contact:hover .cd-c-arr { color: #fff; transform: translate(3px, -3px); }

  /* Experience highlights — hide scrollbar on the mobile swipe carousel */
  .cd-hl-row::-webkit-scrollbar { display: none; }
  .cd-hl-row { -ms-overflow-style: none; }

  /* Floating "next section" button (mobile only) */
  .cd-next-fab {
    display: none;
    position: fixed; right: 16px; bottom: 20px; z-index: 55;
    width: 52px; height: 52px; border-radius: 50%;
    background: var(--coral); color: #fff; border: none; padding: 0;
    align-items: center; justify-content: center;
    box-shadow: 0 12px 26px -8px rgba(201,100,66,0.6);
    animation: cd-fab-bob 2.6s ease-in-out infinite;
  }
  @keyframes cd-fab-bob { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(5px); } }
  @media (max-width: 720px) { .cd-next-fab { display: inline-flex; } }
  @media (prefers-reduced-motion: reduce) { .cd-next-fab { animation: none; } }

  /* Hide rail on small screens */
  @media (max-width: 900px) {
    .chapter-rail { display: none !important; }
    .chapter { padding-left: 20px !important; padding-right: 20px !important; }
  }

  /* Mobile section paddings + cover guide cleanup */
  @media (max-width: 720px) {
    .cd-cover-guide { display: none !important; }
    .chapter, section.chapter, #cover, #ch-02, #ch-04, #ch-06, #ch-07, #coda {
      padding-left: 18px !important;
      padding-right: 18px !important;
    }
    /* Uniform top clearance under the fixed nav for every scroll-target section */
    #ch-02, #ch-04, #ch-06, #ch-07, #coda {
      padding-top: 68px !important;
    }
  }

  /* Reduced motion */
  @media (prefers-reduced-motion: reduce) {
    body, a, button, input { cursor: auto; }
    .bird-cursor { display: none; }
    .bird-wings { animation: none !important; }
    * { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.15s !important; }
  }

  html { scroll-behavior: smooth; }
</style>

<script>
  // Bird cursor — damped follow + velocity tilt + flap.
  (function () {
    const bird = document.getElementById('bird');
    if (!bird) return;
    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

    let mx = window.innerWidth / 2, my = window.innerHeight / 2;
    let bx = mx, by = my, lastBx = mx, lastBy = my;

    window.addEventListener('mousemove', (e) => { mx = e.clientX; my = e.clientY; });
    window.addEventListener('touchmove', (e) => {
      if (e.touches[0]) { mx = e.touches[0].clientX; my = e.touches[0].clientY; }
    }, { passive: true });

    function tick() {
      lastBx = bx; lastBy = by;
      bx += (mx - bx) * 0.14;
      by += (my - by) * 0.14;
      const vx = bx - lastBx;
      const vy = by - lastBy;
      const tilt = Math.max(-28, Math.min(28, vx * 1.8));
      const pitch = Math.max(-10, Math.min(10, -vy * 0.6));
      bird.style.transform =
        `translate3d(${bx}px, ${by}px, 0) translate(-50%, -50%) rotate(${tilt + pitch}deg)`;
      requestAnimationFrame(tick);
    }
    tick();

    document.addEventListener('mouseover', (e) => {
      if (e.target.closest('a,button,input,textarea,[role="button"]')) {
        bird.classList.add('over-link');
      } else {
        bird.classList.remove('over-link');
      }
    });
  })();
</script>
